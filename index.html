<script>
// ==================== ВСТРОЕННЫЕ НАСТРОЙКИ SMTP (GMAIL) ====================
const SMTP_CONFIG = {
    Host: "smtp.gmail.com",
    Port: 587,
    Username: "smeshnoypuls@gmail.com",        // ваш email
    Password: "ntew ktbx ykuv gvwa",           // пароль приложения
    From: "smeshnoypuls@gmail.com",
    FromName: "Дашборд заказа ФК Пульс"
};
// =========================================================================

let catalog = [];
let assortmentLoaded = false;
let sortField = 'code';
let sortDirection = 'asc';

const tableBody = document.getElementById('tableBody');
const totalSkuSpan = document.getElementById('totalSku');
const totalUnitsSpan = document.getElementById('totalUnits');
const totalSumSpan = document.getElementById('totalSum');
const cardBonusSpan = document.getElementById('cardBonus');

function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => m==='&'?'&amp;': m==='<'?'&lt;':'&gt;'); }
function formatDate(date) { if (!date) return '—'; if (date instanceof Date) return date.toLocaleDateString(); return new Date(date).toLocaleDateString(); }

function recalcTotals() {
    let sku = 0, units = 0, sum = 0;
    catalog.forEach(item => { let q = item.quantity || 0; if (q > 0) { sku++; units += q; sum += item.projPrice * q; } });
    let card = (sku >= 50 && sum > 0) ? Math.floor(sum / 10000) * 500 : 0;
    totalSkuSpan.innerText = sku;
    totalUnitsSpan.innerText = units;
    totalSumSpan.innerText = sum.toFixed(2) + ' ₽';
    cardBonusSpan.innerText = card.toFixed(2) + ' ₽';
}

function sortCatalog() {
    catalog.sort((a, b) => {
        let va, vb;
        if (sortField === 'code') { va = a.code; vb = b.code; }
        else if (sortField === 'name') { va = a.name; vb = b.name; }
        else if (sortField === 'price') { va = a.projPrice; vb = b.projPrice; }
        else if (sortField === 'stock') { va = a.stock; vb = b.stock; }
        else return 0;
        if (typeof va === 'string') va = va.toLowerCase();
        if (typeof vb === 'string') vb = vb.toLowerCase();
        if (va < vb) return sortDirection === 'asc' ? -1 : 1;
        if (va > vb) return sortDirection === 'asc' ? 1 : -1;
        return 0;
    });
}

function renderTable() {
    if (!assortmentLoaded) {
        tableBody.innerHTML = '叭<td colspan="9">Загрузите ассортимент по ссылке. </tbody>';
        recalcTotals();
        return;
    }
    sortCatalog();
    let html = '';
    for (let idx = 0; idx < catalog.length; idx++) {
        const item = catalog[idx];
        if (item.stock <= 0) continue; // показываем только товары с остатком >0
        const qty = item.quantity || 0;
        const sumPos = (item.projPrice * qty).toFixed(2);
        const expiryStr = item.expiry ? formatDate(item.expiry) : '—';
        const rowClass = 'row-stock-positive';
        html += `<tr data-idx="${idx}" class="${rowClass}">
            <td>${escapeHtml(item.code)}</td>
            <td class="product-name">${escapeHtml(item.name)}</td>
            <td>${item.projPrice.toFixed(2)}</td>
            <td>${item.stock}</td>
            <td>${item.multiplicity}</td>
            <td>${item.minOrder}</td>
            <td>${expiryStr}</td>
            <td><input type="number" class="qty-input" value="${qty}" min="0" step="${item.multiplicity}" style="width:85px;"></td>
            <td class="sum-cell">${sumPos}</td>
        </tr>`;
    }
    tableBody.innerHTML = html;
    attachEvents();
    recalcTotals();
}

function attachEvents() {
    document.querySelectorAll('#tableBody tr').forEach(row => {
        const idx = row.getAttribute('data-idx');
        if (!idx) return;
        const item = catalog[parseInt(idx)];
        if (!item) return;
        const qtyInput = row.querySelector('.qty-input');
        const sumCell = row.querySelector('.sum-cell');
        if (qtyInput) {
            qtyInput.addEventListener('change', (e) => {
                let val = parseInt(e.target.value);
                if (isNaN(val)) val = 0;
                const mult = item.multiplicity || 1;
                const minOrd = item.minOrder || 1;
                if (val % mult !== 0) {
                    let newVal = Math.floor(val / mult) * mult;
                    if (newVal < minOrd && newVal > 0) newVal = minOrd;
                    if (newVal < 0) newVal = 0;
                    if (newVal !== val) val = newVal;
                }
                if (val < 0) val = 0;
                if (val > item.stock) val = item.stock;
                if (val > 0 && val < minOrd) {
                    alert(`Минимальный заказ для "${item.name}" = ${minOrd} шт. Установлено ${minOrd}.`);
                    val = minOrd;
                    if (val > item.stock) val = item.stock;
                }
                item.quantity = val;
                qtyInput.value = val;
                const sum = (item.projPrice * val).toFixed(2);
                if (sumCell) sumCell.innerText = sum;
                recalcTotals();
            });
        }
    });
}

// Загрузка исключений и фильтрация
async function loadExclusionsAndFilter() {
    const exclusionUrl = "https://reoperator.github.io/puls/minus.xlsx";
    try {
        const resp = await fetch(exclusionUrl);
        if (!resp.ok) throw new Error();
        const ab = await resp.arrayBuffer();
        const wb = XLSX.read(ab, { type: 'array' });
        const sheet = wb.Sheets[wb.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: "" });
        if (!rows.length) return;
        const header = rows[0];
        const idxCode = header.findIndex(cell => String(cell).toLowerCase().includes('код'));
        if (idxCode === -1) return;
        const excludeSet = new Set();
        for (let i = 1; i < rows.length; i++) {
            let code = rows[i][idxCode] ? String(rows[i][idxCode]).trim() : '';
            if (code) excludeSet.add(code);
        }
        catalog = catalog.filter(item => !excludeSet.has(item.code));
        assortmentLoaded = true;
        renderTable();
        alert(`Ассортимент загружен: ${catalog.length} позиций (исключений скрыто: ${excludeSet.size})`);
    } catch (e) {
        console.warn(e);
        assortmentLoaded = true;
        renderTable();
        alert(`Ассортимент загружен: ${catalog.length} позиций (файл исключений не загружен)`);
    }
}

// Загрузка основного ассортимента
async function loadAssortment(url) {
    try {
        const resp = await fetch(url);
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        const ab = await resp.arrayBuffer();
        const wb = XLSX.read(ab, { type: 'array' });
        const sheet = wb.Sheets[wb.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: "" });
        if (!rows.length) throw new Error('Файл пуст');
        const header = rows[0];
        const idxCode = header.findIndex(cell => String(cell).toLowerCase().includes('код'));
        const idxName = header.findIndex(cell => String(cell).toLowerCase().includes('номенклатура'));
        let idxPrice = header.findIndex(cell => String(cell).toLowerCase().includes('цена с ндс'));
        if (idxPrice === -1) idxPrice = header.findIndex(cell => String(cell).toLowerCase().includes('цена проекта'));
        const idxStock = header.findIndex(cell => String(cell).toLowerCase().includes('свободный остаток'));
        const idxMultiplicity = header.findIndex(cell => String(cell).toLowerCase().includes('кратность заказа'));
        const idxMinOrder = header.findIndex(cell => String(cell).toLowerCase().includes('минимальный заказ'));
        const idxExpiry = header.findIndex(cell => String(cell).toLowerCase().includes('срок годности'));
        if (idxCode === -1 || idxName === -1 || idxPrice === -1 || idxStock === -1)
            throw new Error('Не найдены обязательные колонки');
        const newCatalog = [];
        for (let i = 1; i < rows.length; i++) {
            const row = rows[i];
            const code = row[idxCode] ? String(row[idxCode]).trim() : '';
            const name = row[idxName] ? String(row[idxName]).trim() : '';
            if (!code || !name) continue;
            let priceRaw = row[idxPrice], price = 0;
            if (priceRaw !== undefined && priceRaw !== null && priceRaw !== '') {
                if (typeof priceRaw === 'number') price = priceRaw;
                else {
                    let str = String(priceRaw).trim().replace(/\s/g, '').replace(',', '.');
                    price = parseFloat(str);
                }
                if (isNaN(price)) price = 0;
            }
            if (price === 0) continue;
            let stockRaw = row[idxStock], stock = 0;
            if (stockRaw !== undefined && stockRaw !== null && stockRaw !== '') {
                if (typeof stockRaw === 'number') stock = stockRaw;
                else {
                    let str = String(stockRaw).trim().replace(/\s/g, '').replace(',', '.');
                    stock = parseFloat(str);
                }
                if (isNaN(stock)) stock = 0;
            }
            let multiplicity = 1;
            if (idxMultiplicity !== -1 && row[idxMultiplicity] !== undefined && row[idxMultiplicity] !== '') {
                let multRaw = row[idxMultiplicity];
                if (typeof multRaw === 'number') multiplicity = multRaw;
                else {
                    let str = String(multRaw).trim().replace(/\s/g, '').replace(',', '.');
                    let mult = parseFloat(str);
                    if (!isNaN(mult) && mult > 0) multiplicity = mult;
                }
            }
            let minOrder = 1;
            if (idxMinOrder !== -1 && row[idxMinOrder] !== undefined && row[idxMinOrder] !== '') {
                let minRaw = row[idxMinOrder];
                if (typeof minRaw === 'number') minOrder = minRaw;
                else {
                    let str = String(minRaw).trim().replace(/\s/g, '').replace(',', '.');
                    let mo = parseFloat(str);
                    if (!isNaN(mo) && mo > 0) minOrder = mo;
                }
            }
            let expiry = null;
            if (idxExpiry !== -1 && row[idxExpiry] !== undefined && row[idxExpiry] !== '') {
                let exp = row[idxExpiry];
                if (exp instanceof Date) expiry = exp;
                else if (typeof exp === 'string') expiry = new Date(exp);
            }
            newCatalog.push({
                code, name, projPrice: price,
                stock, multiplicity, minOrder, expiry,
                quantity: 0
            });
        }
        if (newCatalog.length === 0) throw new Error('Нет валидных записей');
        catalog = newCatalog;
        await loadExclusionsAndFilter();
    } catch (err) {
        console.error(err);
        alert(`Ошибка загрузки ассортимента: ${err.message}`);
    }
}

// Генерация Excel-файла заказа
function generateOrderExcel() {
    const order = catalog.filter(item => item.quantity > 0 && item.stock > 0);
    if (order.length === 0) return null;
    const data = [['Код', 'Номенклатура', 'Цена с НДС (₽)', 'Количество', 'Сумма (₽)']];
    order.forEach(item => {
        data.push([item.code, item.name, item.projPrice, item.quantity, (item.projPrice * item.quantity).toFixed(2)]);
    });
    const ws = XLSX.utils.aoa_to_sheet(data);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'Заказ');
    const buf = XLSX.write(wb, { bookType: 'xlsx', type: 'array' });
    return new Blob([buf], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
}

function downloadOrderExcel() {
    const blob = generateOrderExcel();
    if (!blob) { alert('Заказ пуст'); return; }
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `заказ_${new Date().toISOString().slice(0,19).replace(/:/g, '-')}.xlsx`;
    a.click();
    URL.revokeObjectURL(a.href);
}

// Отправка письма с вложением через SMTP.js (встроенные учётные данные)
async function sendOrderEmail() {
    const toEmail = document.getElementById('emailSelect').value;
    const subject = `Заказ от ${SMTP_CONFIG.FromName}`;
    
    const orderItems = catalog.filter(item => item.quantity > 0 && item.stock > 0);
    if (orderItems.length === 0) { alert('Заказ пуст.'); return; }
    
    const sku = parseInt(totalSkuSpan.innerText);
    const total = parseFloat(totalSumSpan.innerText.replace(' ₽', ''));
    const card = cardBonusSpan.innerText;
    
    let bodyText = `=== НОВЫЙ ЗАКАЗ ===\n`;
    bodyText += `Дата: ${new Date().toLocaleString()}\n`;
    bodyText += `Получатель: ${toEmail}\n`;
    bodyText += `Количество SKU: ${sku}\n`;
    bodyText += `Сумма заказа: ${total.toFixed(2)} ₽\n`;
    bodyText += `Карточная мотивация: ${card} ₽\n\n`;
    bodyText += `Товары:\n`;
    orderItems.forEach(item => {
        bodyText += `${item.code} | ${item.name} | ${item.quantity} шт | сумма ${(item.projPrice * item.quantity).toFixed(2)} ₽\n`;
    });
    
    const excelBlob = generateOrderExcel();
    if (!excelBlob) return;
    
    // Читаем blob как base64
    const reader = new FileReader();
    reader.readAsDataURL(excelBlob);
    reader.onload = function() {
        const base64Data = reader.result.split(',')[1];
        const smtpConfig = {
            Host: SMTP_CONFIG.Host,
            Port: SMTP_CONFIG.Port,
            Username: SMTP_CONFIG.Username,
            Password: SMTP_CONFIG.Password,
            To: toEmail,
            From: SMTP_CONFIG.From,
            FromName: SMTP_CONFIG.FromName,
            Subject: subject,
            Body: bodyText,
            Attachments: [{
                name: `заказ_${new Date().toISOString().slice(0,19).replace(/:/g, '-')}.xlsx`,
                data: `data:application/vnd.openxmlformats-officedocument.spreadsheetml.sheet;base64,${base64Data}`
            }]
        };
        Email.send(smtpConfig)
            .then(() => alert(`Заказ успешно отправлен на ${toEmail}`))
            .catch(err => alert(`Ошибка отправки: ${err}`));
    };
    reader.onerror = () => alert('Ошибка чтения файла');
}

function resetOrder() {
    catalog.forEach(item => { item.quantity = 0; });
    renderTable();
}

// Сортировка
function setupSorting() {
    const headers = document.querySelectorAll('#orderTable th[data-sort]');
    headers.forEach(th => {
        th.addEventListener('click', () => {
            const field = th.getAttribute('data-sort');
            if (sortField === field) {
                sortDirection = sortDirection === 'asc' ? 'desc' : 'asc';
            } else {
                sortField = field;
                sortDirection = 'asc';
            }
            renderTable();
            headers.forEach(h => {
                const icon = h.querySelector('.sort-icon');
                if (icon) icon.className = 'fas fa-sort sort-icon';
            });
            const icon = th.querySelector('.sort-icon');
            if (icon) icon.className = sortDirection === 'asc' ? 'fas fa-sort-up sort-icon' : 'fas fa-sort-down sort-icon';
        });
    });
}

// Обработчики кнопок
document.getElementById('loadAssortmentBtn').onclick = () => {
    const url = document.getElementById('assortmentUrl').value.trim();
    if (!url) alert('Укажите ссылку');
    else loadAssortment(url);
};
document.getElementById('resetOrderBtn').onclick = resetOrder;
document.getElementById('exportExcelBtn').onclick = downloadOrderExcel;
document.getElementById('sendOrderBtn').onclick = sendOrderEmail;

// Автозагрузка при открытии страницы
window.addEventListener('DOMContentLoaded', () => {
    setupSorting();
    const defaultUrl = document.getElementById('assortmentUrl').value;
    if (defaultUrl) loadAssortment(defaultUrl);
});
</script>
